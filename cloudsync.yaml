# cloudsync.yaml — Config-driven file sync
# Generated by: cloudsync init
#
# Remote — pick ONE style:
#   Mode A (existing rclone remote): only `name` + `bucket`; omit `type`, `provider`, `region`.
#   Mode B (new remote, future setup): set `type`, `provider`, `region`; keys via env or CLI, never YAML.

project:
  name: my-sync-project
  log_dir: ~/cloudsync-logs

remote:
  name: mys3
  type: s3
  provider: AWS
  region: ap-south-1
  bucket: my-bucket-name

directories:
  - name: data
    source: /path/to/local/data
    dest: data
    watch: true
    exclude:
      - "*.tmp"
      - "__pycache__/**"

sync:
  transfers: 32
  checkers: 32
  checksum: true
  backup_versions: true
  version_dir: versions
  debounce_seconds: 30

schedule:
  realtime: true
  weekly_full:
    enabled: true
    day: sunday
    time: "02:00"
    max_age: 8d
  monthly_audit:
    enabled: true
    day: 1
    time: "03:00"
