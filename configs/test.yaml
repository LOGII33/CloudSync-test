# configs/test.yaml — Phase 1 validation (Mode A: remote already in rclone)
# Only name + bucket under remote; type/provider/region come from rclone config.

project:
  name: cloudsync-test
  log_dir: /tmp/cloudsync-test-logs

remote:
  name: test-run-animators
  bucket: animators-418272779024-ap-south-1-an

directories:
  - name: test-data
    source: /tmp/cloudsync-test-source
    dest: Tamizh/test-data
    watch: true
    exclude:
      - "*.tmp"
      - "*.swp"
      - "__pycache__/**"

  - name: test-static
    source: /tmp/cloudsync-test-static
    dest: Tamizh/test-static
    watch: false

sync:
  transfers: 8
  checkers: 8
  checksum: true
  backup_versions: true
  version_dir: versions
  debounce_seconds: 10

schedule:
  realtime: true
  weekly_full:
    enabled: true
    day: sunday
    time: "02:00"
    max_age: 8d
  monthly_audit:
    enabled: true
    day: 1
    time: "03:00"
